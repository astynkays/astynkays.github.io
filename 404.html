<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | KAYS Media Creatives</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', -apple-system, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 900;
      color: #c9a96e;
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .error-desc {
      color: #888;
      margin-bottom: 32px;
      max-width: 400px;
    }
    .error-link {
      display: inline-block;
      padding: 14px 36px;
      background: #c9a96e;
      color: #0a0a0a;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 8px;
      transition: all 0.3s ease;
    }
    .error-link:hover {
      background: #e8d5a3;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div>
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="error-link">Back to Home</a>
  </div>
</body>
</html>
